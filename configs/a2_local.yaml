# CastleRAG local configuration for a dual NVIDIA A2 (16 GB) host.
# Deep-merges on top of configs/base.yaml — only overrides what differs.

dataset:
  root: "/data/castle2024"
  hf_repo: "CASTLE-Dataset/CASTLE2024"   # actual repo ID; base.yaml has the wrong slug
  # Real camera names in the HF repo differ from base.yaml; override here.
  ego_cameras:
    - "Allie"
    - "Bjorn"
    - "Cathal"
  exo_cameras:
    - "Kitchen"
    - "Living1"
    - "Living2"
    - "Meeting"
    - "Reading"
  # Partial-download slice: only hours 08-13 of day 1 land on disk.
  hours: [8, 9, 10, 11, 12, 13]

preprocessing:
  frames_dir: "/data/castle_derived/frames_1fps"
  clips_dir: "/data/castle_derived/clips"
  manifests_dir: "/data/castle_derived/manifests"
  chunks_dir: "/data/castle_derived/chunks"

embedding:
  # We serve a LoRA-merged + repackaged Thinker at /data/models/omniembed-multivent-vllm
  # behind vLLM with --served-model-name omniembed; embed-time requests must use that
  # alias rather than the upstream HF slug.
  model: "omniembed"
  cache_dir: "/data/castle_derived/embeddings"
  vllm_tensor_parallel: 2
  vllm_gpu_memory_utilization: 0.88

# Generation + reranking are served by vLLM running Qwen3-VL-4B-Instruct on
# port 8201 (Qwen3-VL-8B does not fit alongside OmniEmbed on 2x16GB).  During
# eval we run only this model and serve dense query vectors from a precomputed
# OmniEmbed cache.
generation:
  model: "qwen3vl"
  # Qwen3-VL-4B clusters predictions on the last option ('d') when forced to
  # commit on weak evidence; deterministically permuting the four choices per
  # question via sha1(question_id) breaks that positional bias while keeping
  # the eval reproducible.
  shuffle_choices: true
reranking:
  model: "qwen3vl"
  # We only indexed day-1 hours 08-13, so even strong evidence often scores
  # low.  Lowering min_relevance from 1 to 0 keeps weak packs in the rerank
  # output, which materialises non-zero support priors for the fallback
  # answer-extraction path instead of leaving every prior at 0.0.
  min_relevance: 0

qdrant:
  host: "localhost"
  port: 6333

outputs:
  dir: "/data/castle_outputs"
  predictions: "/data/castle_outputs/predictions.json"
  evidence_traces: "/data/castle_outputs/evidence_traces.jsonl"
  submissions: "/data/castle_outputs/submissions.json"
  metrics: "/data/castle_outputs/metrics.json"
